apiVersion: batch/v1
kind: CronJob
metadata:
  name: amazon-scraper-hourly
  namespace: amazon-scraper
  labels:
    app: amazon-scraper
    component: scheduler
spec:
  schedule: "0 * * * *"  # Every hour at minute 0
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: amazon-scraper
            component: scheduler
            job-type: scheduled
        spec:
          serviceAccountName: scraper-service-account
          restartPolicy: OnFailure
          containers:
          - name: scraper-job
            image: amazon-scraper:latest
            command: ["python", "-m", "scheduler.scheduler"]
            env:
            - name: JOB_TYPE
              value: "scheduled"
            - name: JOB_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            envFrom:
            - configMapRef:
                name: scraper-config
            - secretRef:
                name: scraper-secrets
            resources:
              requests:
                memory: "256Mi"
                cpu: "200m"
              limits:
                memory: "1Gi"
                cpu: "500m"
            volumeMounts:
            - name: job-data
              mountPath: /app/data
            - name: config-volume
              mountPath: /app/config
              readOnly: true
          volumes:
          - name: job-data
            emptyDir: {}
          - name: config-volume
            configMap:
              name: proxy-config
          activeDeadlineSeconds: 3600  # 1 hour timeout

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: amazon-scraper-daily-cleanup
  namespace: amazon-scraper
  labels:
    app: amazon-scraper
    component: cleanup
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: amazon-scraper
            component: cleanup
            job-type: maintenance
        spec:
          serviceAccountName: scraper-service-account
          restartPolicy: OnFailure
          containers:
          - name: cleanup-job
            image: amazon-scraper:latest
            command: ["python", "-c"]
            args:
            - |
              import asyncio
              import sys
              import os
              sys.path.insert(0, '/app')
              
              from storage.product_repository import ProductRepository
              from storage.models import create_database_engine, create_session_factory
              
              def cleanup_old_data():
                  database_url = os.getenv('DATABASE_URL')
                  engine = create_database_engine(database_url)
                  SessionLocal = create_session_factory(engine)
                  session = SessionLocal()
                  
                  try:
                      repo = ProductRepository(session)
                      repo.cleanup_old_data(days=30)
                      print("Cleanup completed successfully")
                  except Exception as e:
                      print(f"Cleanup failed: {e}")
                      sys.exit(1)
                  finally:
                      session.close()
                      engine.dispose()
              
              cleanup_old_data()
            envFrom:
            - configMapRef:
                name: scraper-config
            - secretRef:
                name: scraper-secrets
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "250m"
          activeDeadlineSeconds: 1800  # 30 minutes timeout

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: amazon-scraper-health-check
  namespace: amazon-scraper
  labels:
    app: amazon-scraper
    component: health-check
spec:
  schedule: "*/15 * * * *"  # Every 15 minutes
  concurrencyPolicy: Allow
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: amazon-scraper
            component: health-check
            job-type: monitoring
        spec:
          serviceAccountName: scraper-service-account
          restartPolicy: OnFailure
          containers:
          - name: health-check
            image: curlimages/curl:latest
            command: ["sh", "-c"]
            args:
            - |
              echo "Performing health check..."
              
              # Check main service health
              if curl -f -s "http://amazon-scraper-service:8080/health" > /dev/null; then
                echo "✓ Scraper service is healthy"
              else
                echo "✗ Scraper service health check failed"
                exit 1
              fi
              
              # Check database connectivity
              if curl -f -s "http://amazon-scraper-service:8080/database-stats" > /dev/null; then
                echo "✓ Database connectivity OK"
              else
                echo "✗ Database connectivity failed"
                exit 1
              fi
              
              # Check proxy health
              if curl -f -s "http://amazon-scraper-service:8080/proxy-health" > /dev/null; then
                echo "✓ Proxy health check OK"
              else
                echo "⚠ Proxy health check failed (non-critical)"
              fi
              
              echo "Health check completed successfully"
            resources:
              requests:
                memory: "32Mi"
                cpu: "50m"
              limits:
                memory: "64Mi"
                cpu: "100m"
          activeDeadlineSeconds: 300  # 5 minutes timeout
