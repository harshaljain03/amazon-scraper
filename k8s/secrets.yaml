apiVersion: v1
kind: Secret
metadata:
  name: scraper-secrets
  namespace: amazon-scraper
  labels:
    app: amazon-scraper
    component: secrets
type: Opaque
stringData:
  # Database credentials
  DATABASE_URL: "postgresql://scraper_user:scraper_password@postgres-service:5432/amazon_scraper"
  
  # Redis connection
  REDIS_URL: "redis://redis-service:6379/0"
  
  # CAPTCHA service API key
  TWOCAPTCHA_API_KEY: "your_2captcha_api_key_here"
  
  # Secret key for application
  SECRET_KEY: "your-secret-key-change-in-production"
  
  # Proxy credentials (if needed)
  PROXY_USERNAME: "your_proxy_username"
  PROXY_PASSWORD: "your_proxy_password"
  
  # Email settings for notifications
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "your_email@gmail.com"
  SMTP_PASSWORD: "your_email_password"
  
  # Additional API keys
  MONITORING_API_KEY: "your_monitoring_api_key"
