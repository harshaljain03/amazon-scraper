version: 1
disable_existing_loggers: false

formatters:
  default:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  
  json:
    format: '{"timestamp": "%(asctime)s", "logger": "%(name)s", "level": "%(levelname)s", "message": "%(message)s", "module": "%(module)s", "funcName": "%(funcName)s", "lineNo": "%(lineno)d"}'
    datefmt: '%Y-%m-%dT%H:%M:%S'
  
  detailed:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(pathname)s:%(lineno)d - %(funcName)s() - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: json
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/scraper.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8
  
  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/scraper_errors.log
    maxBytes: 10485760  # 10MB
    backupCount: 3
    encoding: utf8

loggers:
  crawler:
    level: DEBUG
    handlers: [console, file]
    propagate: false
    
  monitoring:
    level: INFO
    handlers: [console, file]
    propagate: false
    
  storage:
    level: INFO
    handlers: [console, file]
    propagate: false
    
  proxies:
    level: DEBUG
    handlers: [console, file]
    propagate: false
    
  scraper:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: false
    
  scheduler:
    level: INFO
    handlers: [console, file]
    propagate: false

  # Third party loggers
  requests:
    level: WARNING
    handlers: [console]
    propagate: false
    
  urllib3:
    level: WARNING
    handlers: [console]
    propagate: false
    
  playwright:
    level: WARNING
    handlers: [console]
    propagate: false
    
  sqlalchemy:
    level: WARNING
    handlers: [console]
    propagate: false

root:
  level: INFO
  handlers: [console, file]
